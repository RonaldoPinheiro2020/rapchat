<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPchat Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex items-center justify-center">

    <div id="login-card" class="bg-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-400 tracking-wide">RAPchat Pro</h1>
            <p class="text-slate-400 text-sm mt-2">Insira suas credenciais para acessar o painel</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Usuário</label>
                <input type="text" id="username" required 
                       class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-indigo-500 text-white placeholder-slate-500" 
                       placeholder="Seu usuário">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Senha</label>
                <input type="password" id="password" required 
                       class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-indigo-500 text-white placeholder-slate-500" 
                       placeholder="••••••••">
            </div>

            <div id="error-message" class="text-red-400 text-sm hidden text-center font-medium">
                </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-lg transition duration-200 shadow-lg shadow-indigo-600/30">
                Entrar no Sistema
            </button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
